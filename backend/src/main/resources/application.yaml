spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/flash_sale?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: flashsale
    password: flashsale123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: flash-sale-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.flashsale.backend.dto.event"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  session:
    store-type: none

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  secret: flash-sale-secret-key-for-jwt-token-generation-2024-must-be-at-least-256-bits
  expiration: 3600000       # 1시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)
